services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    environment:
      AXIIA_DB_PATH: ${AXIIA_DB_PATH:-/data/axiia.db}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      ENABLE_WORKER: ${ENABLE_WORKER:-true}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PORT: ${PORT:-3001}
      REGISTRATION_CODE: ${REGISTRATION_CODE:-axiia_cup}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:?SILICONFLOW_API_KEY is required}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-8}
    volumes:
      - ${AXIIA_DATA_DIR:-./data}/api:/data

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    depends_on:
      - api
    ports:
      - 127.0.0.1:${WEB_HOST_PORT:-8200}:80
    restart: unless-stopped
